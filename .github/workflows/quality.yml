name: 코드 품질 검사

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: 테스트 및 문법 검사
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 내려받기
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: python -m pip install -r requirements.txt

      - name: Python 문법 검사
        run: python -m compileall -q main.py crawler scripts

      - name: 단위 테스트 실행
        run: python -m unittest discover -s tests -v
