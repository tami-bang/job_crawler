name: 잡코리아 채용공고 수집

on:
  schedule:
    # GitHub Actions의 cron은 UTC 기준입니다. 아래 시간은 평일 오전 9시(KST)입니다.
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      keyword_batch_size:
        description: "이번 실행에서 처리할 검색 키워드 수"
        required: true
        default: "5"
      pages:
        description: "키워드별 수집 페이지 수"
        required: true
        default: "1"
      detail_limit:
        description: "상세 내용을 수집할 최대 공고 수"
        required: true
        default: "25"
      report_top_n:
        description: "리포트에 포함할 최대 공고 수"
        required: true
        default: "50"

permissions:
  contents: read

concurrency:
  group: jobkorea-crawler
  cancel-in-progress: false

jobs:
  crawl:
    name: 수집·분석·리포트 생성
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 저장소 내려받기
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: python -m pip install -r requirements.txt

      - name: Chrome 확인
        run: google-chrome --version

      - name: 채용공고 수집 및 분석
        env:
          KEYWORD_BATCH_SIZE: ${{ inputs.keyword_batch_size || '5' }}
          PAGES: ${{ inputs.pages || '1' }}
          DETAIL_LIMIT: ${{ inputs.detail_limit || '25' }}
          REPORT_TOP_N: ${{ inputs.report_top_n || '50' }}
        run: |
          python main.py jobkorea-multi-pipeline \
            --keyword-batch-size "$KEYWORD_BATCH_SIZE" \
            --pages "$PAGES" \
            --detail-limit "$DETAIL_LIMIT" \
            --report-top-n "$REPORT_TOP_N" \
            --keyword-delay 2

      - name: 실제 수집 결과 검증
        run: |
          JOB_COUNT=$(python -c "import sqlite3; conn = sqlite3.connect('data/job_radar.db'); print(conn.execute('SELECT COUNT(*) FROM job_postings').fetchone()[0])")
          echo "수집된 채용공고: $JOB_COUNT건"
          if [ "$JOB_COUNT" -eq 0 ]; then
            echo "::error::실제 수집된 채용공고가 없습니다. 대상 사이트 연결 상태를 확인하세요."
            exit 1
          fi

      - name: 실행 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobkorea-result-${{ github.run_number }}
          path: |
            data/
            crawler.log
          if-no-files-found: warn
          retention-days: 14
