name: 무료 데모 사이트 배포

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 정적 데모 빌드
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: 저장소 내려받기
        uses: actions/checkout@v4
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Pages 설정
        uses: actions/configure-pages@v5
      - name: 의존성 설치
        run: npm ci
      - name: 정적 데모 빌드
        env:
          NEXT_PUBLIC_STATIC_DEMO: "true"
        run: npm run build
      - name: 배포 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    name: GitHub Pages 배포
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5
